<script src="custom_components/home_weather/www/weather-panel.js"></script>

  earthquakes: { earthquakes: [{ id: "eq1", magnitude: 3.2, place: "10 mi N of Ridgecrest, CA", time: "2026-07-20T12:30:00Z", depth: 8.5, lon: -117.6, lat: 35.8 }], summary: { count: 1, maxMagnitude: 3.2, minMagnitude: 3.2 } },
  space_map: { planets: [{ name: "Mercury", symbol: "☿", distance_au: 0.39, angle: 45 }, { name: "Venus", symbol: "♀", distance_au: 0.72, angle: 120 }, { name: "Earth", symbol: "⊕", distance_au: 1.00, angle: 200 }, { name: "Mars", symbol: "♂", distance_au: 1.52, angle: 280 }, { name: "Jupiter", symbol: "♃", distance_au: 5.20, angle: 10 }], solar_activity: "Minor solar flares detected. R1 radio blackout risk.", k_index: 3, sunspot_count: 45, flare_count: 2 },

  lightning: { strikes: [], hourly_count: 0, nearest: null },
  volcanoes: { volcanoes: [], alerts: [] },
  wildfires: { wildfires: [], perimeters: [] },
  air_quality: { aqi: 42, category: "Good", alerts: [] },
  solar_weather: { solar_activity: "Minor solar flares detected", k_index: 3, sunspot_count: 45, flare_count: 2 },
  travel_advisories: { advisories: [{ country: "Mexico", level: 2, message: "Exercise increased caution." }] },
  version: { version: "2.0.0" },
};

const mockConn = {
  subscribeMessage: function(handler, msg) {
    const type = msg.type;
    let result;
    switch (type) {
      case "home_weather/get_config": result = mockData.config; break;
      case "home_weather/get_weather": result = mockData.weather; break;
      case "home_weather/get_hurricanes": result = mockData.hurricanes; break;
      case "home_weather/get_tornadoes": result = mockData.tornadoes; break;
      case "home_weather/get_earthquakes": result = mockData.earthquakes; break;
      case "home_weather/get_lightning": result = mockData.lightning; break;
      case "home_weather/get_volcanoes": result = mockData.volcanoes; break;
      case "home_weather/get_wildfires": result = mockData.wildfires; break;
      case "home_weather/get_air_quality": result = mockData.air_quality; break;
      case "home_weather/get_space_map": result = mockData.space_map; break;
      case "home_weather/get_solar_weather": result = mockData.solar_weather; break;
      case "home_weather/get_travel_advisories": result = mockData.travel_advisories; break;
      case "home_weather/get_version": result = mockData.version; break;
      case "home_weather/set_config": result = { success: true }; break;
      default: result = {};
    }
    setTimeout(() => handler({ success: true, result }), 80);
    return () => {};
  },
};

// Wait for panel to be ready
const panel = document.getElementById('panel');

function startPreview() {
  panel.hass = { connection: mockConn };
  // Notify parent that panel is ready
  window.parent.postMessage('panel-ready', '*');
}

if (customElements.get('home-weather-panel')) {
  startPreview();
} else {
  const check = setInterval(() => {
    if (customElements.get('home-weather-panel')) {
      clearInterval(check);
      startPreview();
    }
  }, 50);
  setTimeout(() => { clearInterval(check); startPreview(); }, 3000);
}

// Listen for commands from parent window
window.addEventListener('message', (e) => {
  if (e.data.type === 'set-view' && panel._navigateTo) {
    panel._navigateTo(e.data.view);
  }
  if (e.data.type === 'set-theme' && panel._appearance) {
    panel._appearance.mode = e.data.theme;
    panel._applyTheme();
  }
});
</script>
</body>
</html>
