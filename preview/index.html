<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Weather V2 — Preview</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    overflow: hidden;
  }
  #preview-container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }
  home-weather-panel {
    display: block;
    width: 100%;
    height: 100%;
  }
  /* Toolbar */
  #toolbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(17,17,17,0.95);
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 9999;
    backdrop-filter: blur(8px);
  }
  #toolbar .title {
    font-size: 14px;
    font-weight: 600;
    color: #03a9f4;
    margin-right: auto;
  }
  #toolbar button {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 150ms;
  }
  #toolbar button:hover { background: #3a3a3a; }
  #toolbar button.active { background: #03a9f4; color: #fff; border-color: #03a9f4; }
  #toolbar select {
    background: #2a2a2a;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  /* Make room for toolbar */
  #preview-container { padding-top: 48px; height: calc(100vh); }
  /* Loading overlay */
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    z-index: 99999;
    transition: opacity 400ms;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #333;
    border-top-color: #03a9f4;
    border-radius: 50%;
    animation: spin 800ms linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { margin-top: 12px; color: #888; font-size: 14px; }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <div class="title">Home Weather V2 — Preview</div>
  <select id="view-select">
    <option value="forecast">Forecast</option>
    <option value="hurricanes">Hurricanes</option>
    <option value="space">Space</option>
    <option value="alerts">Alerts</option>
    <option value="trends">Trends</option>
    <option value="settings">Settings</option>
  </select>
  <select id="theme-select">
    <option value="dark">Dark Mode</option>
    <option value="light">Light Mode</option>
  </select>
  <select id="width-select">
    <option value="100%">Full Width</option>
    <option value="768px">Tablet (768px)</option>
    <option value="375px">Mobile (375px)</option>
  </select>
</div>

<!-- Preview container -->
<div id="preview-container">
  <home-weather-panel id="panel"></home-weather-panel>
</div>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
</div>

<!-- Load bundled panel -->
<script src="../custom_components/home_weather/www/weather-panel.js"></script>

<script>
(function() {
  const panel = document.getElementById('panel');
  const loading = document.getElementById('loading');

  // Wait for panel to be defined
  const startPreview = () => {
    panel.hass = window.hass;
    // Trigger initial render after a tick
    setTimeout(() => {
      loading.classList.add('hidden');
      setTimeout(() => loading.remove(), 400);
    }, 300);
  };

  if (customElements.get('home-weather-panel')) {
    startPreview();
  } else {
    // Poll until defined
    const poll = setInterval(() => {
      if (customElements.get('home-weather-panel')) {
        clearInterval(poll);
        startPreview();
      }
    }, 100);
    // Fallback after 3s
    setTimeout(() => {
      clearInterval(poll);
      if (!panel.hass) startPreview();
    }, 3000);
  }

  // Toolbar controls
  const viewSelect = document.getElementById('view-select');
  const themeSelect = document.getElementById('theme-select');
  const widthSelect = document.getElementById('width-select');

  viewSelect.addEventListener('change', () => {
    const view = viewSelect.value;
    // Panel doesn't expose view navigation externally, so we trigger via custom event
    if (panel._navigateTo) {
      panel._navigateTo(view);
    }
  });

  themeSelect.addEventListener('change', () => {
    const mode = themeSelect.value;
    if (panel._appearance) {
      panel._appearance.mode = mode;
      panel._applyTheme();
    }
  });

  widthSelect.addEventListener('change', () => {
    const width = widthSelect.value;
    const container = document.getElementById('preview-container');
    container.style.maxWidth = width === '100%' ? 'none' : width;
    container.style.margin = width === '100%' ? '0' : '0 auto';
    // Trigger resize
    window.dispatchEvent(new Event('resize'));
  });
})();
</script>
